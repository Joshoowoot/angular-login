<div class="container-fluid custom-bg d-flex align-items-center justify-content-center min-vh-100">
  <div class="text-center">
    <h1 class="mb-5">REGISTRATION PAGE</h1>

    <div class="d-flex justify-content-center">
      <form (ngSubmit)="onSubmit()" #registerForm="ngForm" class="registration-form">
        
        <!-- Success Message -->
        <div *ngIf="registrationSuccess" class="alert alert-success" role="alert">
          Registration successful! Redirecting to login...
        </div>

        <!-- Error Message -->
        <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
          {{ errorMessage }}
        </div>

        <!-- First Name -->
        <div class="mb-3">
          <label class="form-label">First Name</label>
          <input 
            type="text" 
            class="form-control form-control-sm" 
            [(ngModel)]="firstName" 
            name="firstName" 
            #firstNameModel="ngModel"
            required>
          <small *ngIf="firstNameModel.invalid && firstNameModel.touched" class="text-danger">
            First name is required
          </small>
        </div>

        <!-- Last Name -->
        <div class="mb-3">
          <label class="form-label">Last Name</label>
          <input 
            type="text" 
            class="form-control form-control-sm" 
            [(ngModel)]="lastName" 
            name="lastName" 
            #lastNameModel="ngModel"
            required>
          <small *ngIf="lastNameModel.invalid && lastNameModel.touched" class="text-danger">
            Last name is required
          </small>
        </div>

        <!-- Email -->
        <div class="mb-3">
          <label class="form-label">Email address</label>
          <input 
            type="email" 
            class="form-control form-control-sm" 
            [(ngModel)]="email" 
            name="email" 
            #emailModel="ngModel" 
            required 
            email>
          <small *ngIf="emailModel.invalid && emailModel.touched" class="text-danger">
            Please enter a valid email
          </small>
        </div>

        <!-- Password -->
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input 
            type="password" 
            class="form-control form-control-sm" 
            [(ngModel)]="password" 
            name="password" 
            #passwordModel="ngModel"
            required
            minlength="6">
          <small *ngIf="passwordModel.invalid && passwordModel.touched" class="text-danger">
            Password must be at least 6 characters
          </small>
        </div>

        <!-- Confirm Password -->
        <div class="mb-3">
          <label class="form-label">Confirm Password</label>
          <input 
            type="password" 
            class="form-control form-control-sm" 
            [(ngModel)]="confirmPassword" 
            name="confirmPassword" 
            #confirmPasswordModel="ngModel"
            required>
          <small *ngIf="confirmPasswordModel.invalid && confirmPasswordModel.touched" class="text-danger">
            Please confirm your password
          </small>
        </div>

        <!-- Submit Button -->
        <button 
          type="submit" 
          class="btn btn-primary" 
          [disabled]="!registerForm.valid || registrationSuccess">
          Register
        </button>

        <br>

        <!-- Login Link -->
        <p class="mt-3">
          Already have an account? 
          <a (click)="goToLogin()" class="text-decoration-none" style="cursor: pointer;">Login here</a>
        </p>
      </form>
    </div>
  </div>
</div>
