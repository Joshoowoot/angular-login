<div class="container-fluid custom-bg d-flex align-items-center justify-content-center min-vh-100">
  <div class="text-center">
    <h1 class="mb-5">LOGIN PAGE</h1>

    <div class="d-flex justify-content-center">
      <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
        <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
          {{ errorMessage }}
        </div>

        <div class="mb-3">
          <label class="form-label">Email address</label>
          <input type="email" class="form-control form-control-sm" [(ngModel)]="email" name="email" #emailModel="ngModel" required email>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control form-control-sm" [(ngModel)]="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary" [disabled]="!loginForm.valid || emailModel.invalid">Login</button> <br>

        <br>
        <p class="mt-3">
          Don't have an account? 
          <a (click)="goToRegister()" class="text-decoration-none" style="cursor: pointer;">Register here</a>
        </p>
      </form>
    </div>
  </div>
</div>
